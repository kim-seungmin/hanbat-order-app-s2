apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  # TODO: namespace 를 본인 네임스페이스로 변경
  namespace: hanbat-kim-seungmin
  labels:
    app: payment-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-api
  template:
    metadata:
      labels:
        app: payment-api
    spec:
      containers:
        - name: payment-api
          # Phase 3에서 GitHub Actions 가 이 태그를 자동으로 교체합니다
          image: <ACR_NAME>.azurecr.io/payment-api:PLACEHOLDER
          ports:
            - containerPort: 8080
          env:
            # ---------------------------------------------------------------
            # Phase 1 장애 재현용 환경변수
            # 기본값: 정상 동작 (지연 없음, 에러 없음)
            # 장애 재현 시: FAULT_DELAY_MS=8000 으로 변경 후 재배포
            # ---------------------------------------------------------------
            - name: FAULT_DELAY_MS
              value: "0"
            - name: FAULT_ERROR_RATE
              value: "0.0"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
