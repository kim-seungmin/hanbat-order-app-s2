apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-web
  namespace: hanbat-kim-seungmin
  labels:
    app: order-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-web
  template:
    metadata:
      labels:
        app: order-web
    spec:
      containers:
        - name: order-web
          image: <ACR_NAME>.azurecr.io/order-web:PLACEHOLDER
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
