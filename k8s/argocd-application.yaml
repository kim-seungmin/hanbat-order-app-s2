apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hanbat-s2-<본인_GitHub_사용자명>
  # ArgoCD 가 설치된 네임스페이스 (강사가 사전 설치)
  namespace: argocd
  labels:
    project: hanbat-s2
spec:
  project: default
  source:
    # TODO: 본인 GitHub 레포지터리 URL 로 변경하세요
    # 예) https://github.com/<본인_GitHub_사용자명>/hanbat-order-app-s2
    repoURL: https://github.com/<본인_GitHub_사용자명>/hanbat-order-app-s2
    targetRevision: main
    # k8s/ 디렉터리의 매니페스트를 모두 배포
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: hanbat-kim-seungmin
  syncPolicy:
    automated:
      prune: true      # Git 에서 삭제된 리소스는 클러스터에서도 삭제
      selfHeal: true   # 클러스터 상태가 Git 과 달라지면 자동 복구
    syncOptions:
      - CreateNamespace=true
